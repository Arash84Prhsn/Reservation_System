openapi: 3.0.0
info:
  title: Computer Lab Reservation System - Authentication API
  description: |
    Authentication endpoints for user registration, login, logout, and session management.
    
    ## Authentication Flow
    1. User registers with username, password, and email/phone
    2. User logs in with username and password
    3. Server returns a session cookie automatically
    4. Subsequent requests include the session cookie
    5. User logs out to clear the session
    
    ## Session Information
    - Session cookie is automatically handled by the browser
    - Cookie name: `session`
    - Cookie is HttpOnly (not accessible via JavaScript)
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000/api
    description: Development Server
  - url: https://your-production-domain.com/api
    description: Production Server

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: "^[a-zA-Z0-9_]+$"
          example: john_doe
          description: Unique username (alphanumeric and underscore only)
        password:
          type: string
          minLength: 8
          example: SecurePass123
          description: At least 8 chars, 1 uppercase, 1 lowercase, 1 number
        email:
          type: string
          format: email
          example: john@example.com
          description: Required if phone not provided
        phone:
          type: string
          example: "+1234567890"
          description: Required if email not provided
        association:
          type: string
          enum:
            - Student
            - DataScience competitions
            - Master's student
            - PhD student
            - Dotin
          example: PhD student
          description: Determines daily reservation limit

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Registration successful! You can now log in to your new account.
        data:
          type: object
          properties:
            username:
              type: string
              example: john_doe
            association:
              type: string
              example: PhD student

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: john_doe
          description: Username (case-sensitive)
        password:
          type: string
          format: password
          example: SecurePass123

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logged in successfully
        data:
          type: object
          properties:
            username:
              type: string
              example: john_doe
            association:
              type: string
              example: PhD student
            email:
              type: string
              nullable: true
              example: john@example.com
            phone:
              type: string
              nullable: true
              example: null

    CurrentUserResponse:
      type: object
      properties:
        authenticated:
          type: boolean
          example: true
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            username:
              type: string
              example: john_doe
            association:
              type: string
              example: PhD student
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: logged out successfully

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie automatically set after login

paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new user account. Either email or phone is required.
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              with_email:
                summary: Registration with email
                value:
                  username: john_doe
                  password: SecurePass123
                  email: john@example.com
                  association: PhD student
              with_phone:
                summary: Registration with phone
                value:
                  username: jane_doe
                  password: SecurePass123
                  phone: "+1234567890"
                  association: Dotin
              student_registration:
                summary: Student registration
                value:
                  username: student1
                  password: StudentPass123
                  email: student@university.edu
                  association: Student
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Missing required fields or weak password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing_username:
                  value:
                    success: false
                    message: username required
                missing_contact:
                  value:
                    success: false
                    message: email or phone number is needed
                weak_password:
                  value:
                    success: false
                    message: Password must be at least 8 characters
        '409':
          description: Username, email, or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                username_exists:
                  value:
                    success: false
                    message: Username already exists
                email_exists:
                  value:
                    success: false
                    message: Email already exists
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Login to your account
      description: Authenticates a user and starts a session. The session cookie is automatically set.
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: john_doe
              password: SecurePass123
      responses:
        '200':
          description: Login successful - session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
                example: session=abc123...; HttpOnly; Path=/
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Username and password required
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: Invalid username or password

  /auth/me:
    get:
      summary: Get current user
      description: Returns information about the currently authenticated user.
      operationId: getCurrentUser
      tags:
        - Authentication
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User is authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
              example:
                authenticated: true
                user:
                  id: 1
                  username: john_doe
                  association: PhD student
                  email: john@example.com
                  phone: null
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                    example: false
              example:
                authenticated: false

  /auth/logout:
    post:
      summary: Logout of your account
      description: Ends the current session and clears the session cookie.
      operationId: logoutUser
      tags:
        - Authentication
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: You are not logged in