openapi: 3.0.0
info:
  title: Financial technologies Lab Reservation System API
  description: |
    API for the Computer Lab Reservation System.
    
    ## Features as of now
    - User registration with validation
    - Login/logout with session management
    - Profile management (view, update email, username, phone)
    - Session information retrieval
    
    ## Authentication
    This API uses session-based authentication. After successful login, a session cookie is automatically set.
    All subsequent requests requiring authentication must include this cookie.
  version: 2.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000/api
    description: Development Server
  - url: http://localhost:8000
    description: Frontend Server

components:
  schemas:
    # ============ AUTH SCHEMAS ============
    
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_\\u0600-\\u06FF\\s]{3,20}$"
          example: john_doe
          description: "Persian/English letters, numbers, underscore, spaces allowed"
        password:
          type: string
          minLength: 8
          example: SecurePass123
          description: "At least 8 chars, 1 uppercase, 1 lowercase, 1 number"
        email:
          type: string
          format: email
          example: user@example.com
          description: "Required if phone not provided"
        phone:
          type: string
          example: "09123456789"
          description: "Required if email not provided. Iranian or international format"
        association:
          type: string
          enum:
            - None
            - Dotin
            - Related Company
            - Bachelor student
            - Master's student
            - PhD student
          example: Master's student
          description: "User's association type"

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Registration successful! You can now log in to your new account."
        data:
          type: object
          properties:
            username:
              type: string
            association:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          example: SecurePass123

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Logged in successfully"
        data:
          type: object
          properties:
            username:
              type: string
            association:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Logged out successfully"

    # ============ USER SCHEMAS ============

    UserProfile:
      type: object
      properties:
        username:
          type: string
        id:
          type: integer
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        association:
          type: string
          nullable: true

    UpdateEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: newemail@example.com

    UpdateUsernameRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_\\u0600-\\u06FF\\s]{3,20}$"
          example: new_username

    UpdatePhoneRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09351234567"
          description: "Iranian or international format"

    IdResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer

    SessionInfoResponse:
      type: object
      properties:
        logged_in:
          type: boolean
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        association:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie automatically set after login

paths:
  # ==================== AUTH ENDPOINTS ====================
  
  /auth/register:
    post:
      summary: Register a new user
      description: |
        Creates a new user account.
        - Either email OR phone is required
        - Username must be 3-20 chars, Persian/English letters, numbers, underscore, spaces
        - Password must be at least 8 chars with uppercase, lowercase, and number
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              with_email:
                summary: Registration with email
                value:
                  username: john_doe
                  password: SecurePass123
                  email: john@example.com
                  association: Master's student
              with_phone:
                summary: Registeration with phone
                value:
                  username: john_doe
                  password: SecurePass123
                  phone: "09308749649"
                  association: PhD student
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Missing required fields or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username, email, or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /auth/login:
    post:
      summary: Login to your account
      description: Authenticates a user and starts a session. Session cookie is automatically set.
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful - session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          headers:
            Set-Cookie:
              description: Session cookie
              schema:
                type: string
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout of your account
      description: Ends the current session and clears the session cookie.
      operationId: logoutUser
      tags:
        - Authentication
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== USER ENDPOINTS ====================

  /user/is_logged_in:
    get:
      summary: Check if user is logged in
      description: Returns authentication status without requiring session cookie
      operationId: isLoggedIn
      tags:
        - User
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  authenticated:
                    type: boolean

  /user/id:
    get:
      summary: Get current user ID
      description: Returns the ID of the currently logged in user
      operationId: getUserId
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User ID retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/session_info:
    get:
      summary: Get full session information
      description: Returns all session data for the current user
      operationId: getSessionInfo
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Session data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfoResponse'
        '401':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile:
    get:
      summary: Get current user profile
      description: Returns detailed profile information for the logged in user
      operationId: getUserProfile
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile/{id}:
    get:
      summary: Get user profile by ID
      description: Returns profile information for any user (requires login)
      operationId: getUserProfileById
      tags:
        - User
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not logged in
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/updateEmail:
    put:
      summary: Update user email
      description: Updates the email address of the currently logged in user
      operationId: updateEmail
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailRequest'
      responses:
        '200':
          description: Email updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newEmail:
                    type: string
        '400':
          description: Invalid email or field empty
        '401':
          description: Not logged in
        '409':
          description: Email already exists

  /user/updateUsername:
    put:
      summary: Update username
      description: Updates the username of the currently logged in user
      operationId: updateUsername
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsernameRequest'
      responses:
        '200':
          description: Username updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newUsername:
                    type: string
        '400':
          description: Invalid username format
        '401':
          description: Not logged in
        '409':
          description: Username already exists

  /user/updatePhone:
    put:
      summary: Update phone number
      description: Updates the phone number of the currently logged in user
      operationId: updatePhone
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePhoneRequest'
      responses:
        '200':
          description: Phone number updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newPhone:
                    type: string
        '400':
          description: Invalid phone number format
        '401':
          description: Not logged in
        '409':
          description: Phone number already exists