  /reservation/make_reservation:
    post:
      summary: Validate a reservation (dry run)
      description: |
        Validates a reservation without saving to database.
        Checks:
        - Time within operating hours (8:00-14:00)
        - Minimum 15 minutes duration
        - 15-minute increments
        - Date is within allowed reservation window
        - User hasn't hit daily limit (2 per day)
        - No conflicts with events or other reservations
        - Valid seat number for the seat type
        
        Use this endpoint to check if a reservation is valid before final submission.
      operationId: makeReservation
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeReservationRequest'
      responses:
        '200':
          description: Reservation validated successfully (may have warnings)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MakeReservationResponse'
        '400':
          description: Validation failed (conflict, invalid time, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  warning:
                    type: object
                    properties:
                      needed:
                        type: boolean
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/final_reservation_submission:
    post:
      summary: Submit a reservation (actually saves to database)
      description: |
        Creates and saves a reservation to the database.
        All validation should be done before calling this endpoint.
      operationId: finalReservationSubmission
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalReservationSubmissionRequest'
      responses:
        '201':
          description: Reservation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalReservationSubmissionResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/cancel_reservation_by_id:
    put:
      summary: Cancel a reservation by ID
