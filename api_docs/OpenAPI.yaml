openapi: 3.0.0
info:
  title: Financial Technologies Lab Reservation System API
  description: |
    API for the Computer Lab Reservation System.
    
    ## Features
    - User registration with validation
    - Login/logout with session management
    - Profile management (view, update email, username, phone)
    - Session information retrieval
    - Weekly schedule viewing for specific seats (intervals and timeslots)
    - Reservation creation with conflict checking
    - Final reservation submission
    - User reservation limits and availability checking
    - Cancel reservations by ID or by reservation details

    ## Test Accounts (for development)
    
    The following test accounts are pre-seeded in the database for development purposes.
    All passwords are `UserPass123`.
    
    | Username | Password | Association | Email | Phone |
    |----------|----------|-------------|-------|-------|
    | alireza_ahmadi | UserPass123 | Master's student | alireza@example.com | - |
    | sara_mohammadi | UserPass123 | PhD student | sara@example.com | - |
    | mehdi_karimi | UserPass123 | Dotin employee | - | 09123456789 |
    | narges_hosseini | UserPass123 | Bachelor student | narges@example.com | - |
    | amir_rezaei | UserPass123 | Related Company | - | 09198765432 |
    | محمد رضایی | UserPass123 | Bachelor student | mohammad@example.com | - |
    | زهرا کریمی | UserPass123 | Master's student | zahra@example.com | - |
    | علی محمدی | UserPass123 | Dotin employee | - | 09351234567 |
    | فاطمه حسینی | UserPass123 | PhD student | fatemeh@example.com | - |
    | رضا احمدی | UserPass123 | Related Company | - | 09361234567 |
    | مریم کاظمی | UserPass123 | Bachelor student | maryam@example.com | - |
    | حسین رستمی | UserPass123 | Dotin associate | - | 09371234567 |
    | سارا موسوی | UserPass123 | Master's student | sara_mousavi@example.com | - |
    | امیرعباس نوروزی | UserPass123 | Data science competitions | - | 09381234567 |
    | نگار مظلومی | UserPass123 | Bachelor student | negar@example.com | - |
      
    
    ## Mock Reservations (for development)
    
    Upon running the program a total of 58 mock reservations for the current week will be inserted
    to the database

    ## Authentication
    This API uses session-based authentication. After successful login, a session cookie is automatically set.
    All subsequent requests requiring authentication must include this cookie.
    
    ## Dotin Affiliates
    Users with the following associations are considered "Dotin affiliates" and have special privileges:
    - Dotin employee
    - Dotin associate
    - Data science competitions
    
    ## Dotin Seat Rules
    - **Current week**: ALL users can reserve Dotin seats
    - **Next week**: ONLY Dotin affiliates can reserve Dotin seats
    
    ## Business Rules
    - Operating hours: 8:00 AM to 2:00 PM (6 hours)
    - Minimum reservation: 15 minutes
    - Time increments: 15 minutes (:00, :15, :30, :45)
    - Operating days: Saturday to Wednesday (no Thu/Fri)
    - Daily limit: 2 reservations per user per day (non-overlapping)
    - Users can have 2 reservations on 2 different seats on the same day
    - Next week reservations open: Tuesday 12:00 PM
    - Cancellation: Cannot cancel reservations on the current day
    - Events override reservations (if an event is scheduled, conflicting reservations are cancelled)
    
    ## Reservation Types
    - "only running programs" - Computer only, seat remains free for laptop users
    - "dorsan desk" - Computer only (similar to above)
    - "internship" - Internship reservation
    - "project" - Project reservation
    
  version: 5.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000/api
    description: Development Server

components:
  schemas:
    # ============ AUTH SCHEMAS ============
    
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_\\u0600-\\u06FF\\s]{3,20}$"
          example: john_doe
          description: "Persian/English letters, numbers, underscore, spaces allowed"
        password:
          type: string
          minLength: 8
          example: SecurePass123
          description: "At least 8 chars, 1 uppercase, 1 lowercase, 1 number"
        email:
          type: string
          format: email
          example: user@example.com
          description: "Required if phone not provided"
        phone:
          type: string
          example: "09123456789"
          description: "Required if email not provided. Iranian or international format"
        association:
          type: string
          enum:
            - None
            - Dotin employee
            - Dotin associate
            - Data science competitions
            - Related Company
            - Bachelor student
            - Master's student
            - PhD student
          example: Master's student
          description: "User's association type"

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "اکانت شما با موفقیعت ایجاد شد"
        data:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            association:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          example: SecurePass123

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Logged in successfully"
        data:
          type: object
          properties:
            id:
              type: integer
            username:
              type: string
            association:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Logged out successfully"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    # ============ USER SCHEMAS ============

    UserProfile:
      type: object
      properties:
        username:
          type: string
        id:
          type: integer
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        association:
          type: string
          nullable: true

    UpdateEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: newemail@example.com

    UpdateUsernameRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_\\u0600-\\u06FF\\s]{3,20}$"
          example: new_username

    UpdatePhoneRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09351234567"
          description: "Iranian or international format"

    IdResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer

    SessionInfoResponse:
      type: object
      properties:
        logged_in:
          type: boolean
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        association:
          type: string
          nullable: true

    # ============ RESERVATION SCHEMAS ============

    WeeklyScheduleRequest:
      type: object
      required:
        - seat_type
        - seat_number
      properties:
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    WeeklyScheduleByDateRequest:
      type: object
      required:
        - date
        - seat_type
        - seat_number
      properties:
        date:
          type: string
          format: date
          example: "2024-01-15"
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    TimeSlot:
      type: object
      properties:
        timeslot_number:
          type: integer
          example: 1
        start_time:
          type: string
          example: "08:00"
        end_time:
          type: string
          example: "08:15"
        status:
          type: string
          enum: [free, reserved_by_user, reserved_by_others, event]
        reservation_type:
          type: string
          nullable: true
        reserved_by:
          type: integer
          nullable: true
          description: "User ID of who reserved/created the event"

    DailySchedule:
      type: object
      properties:
        date:
          type: string
          format: date
        slots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'

    WeeklyScheduleResponse:
      type: object
      properties:
        success:
          type: boolean
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/DailySchedule'

    OpenDatesRequest:
      type: object
      required:
        - seat_type
      properties:
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin

    OpenDatesResponse:
      type: object
      properties:
        success:
          type: boolean
        dates:
          type: array
          items:
            type: string
            format: date

    HitLimitRequest:
      type: object
      required:
        - reservation_date
      properties:
        reservation_date:
          type: string
          format: date
          example: "2024-01-15"

    HitLimitResponse:
      type: object
      properties:
        success:
          type: boolean
        has_hit_limit:
          type: boolean

    MakeReservationRequest:
      type: object
      required:
        - reservation_date
        - reservation_type
        - start_time
        - end_time
        - seat_type
        - seat_number
      properties:
        reservation_date:
          type: string
          format: date
          example: "2024-01-15"
        reservation_type:
          type: string
          enum: ["only running programs", "internship", "project", "dorsan desk"]
          example: "internship"
        start_time:
          type: string
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          example: "09:00"
        end_time:
          type: string
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          example: "10:00"
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    ReservationConflictWarning:
      type: object
      properties:
        needed:
          type: boolean
        conflict_intervals:
          type: array
          items:
            type: object
            properties:
              start_time:
                type: string
              end_time:
                type: string
        warning_message:
          type: string

    MakeReservationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        warning:
          $ref: '#/components/schemas/ReservationConflictWarning'
        reservation_info:
          type: object
          properties:
            start_time:
              type: string
            end_time:
              type: string
            reservation_type:
              type: string
            reservation_date:
              type: string
            seat_type:
              type: string
            seat_number:
              type: integer

    FinalReservationSubmissionRequest:
      type: object
      required:
        - reservation_date
        - reservation_type
        - start_time
        - end_time
        - seat_type
        - seat_number
      properties:
        reservation_date:
          type: string
          format: date
          example: "2024-01-15"
        reservation_type:
          type: string
          enum: ["only running programs", "internship", "project", "dorsan desk"]
          example: "internship"
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "10:00"
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    FinalReservationSubmissionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          example: "رزرو شما با موفقیت ایجاد شد"

    CancelReservationByIdRequest:
      type: object
      required:
        - reservation_id
      properties:
        reservation_id:
          type: integer
          example: 123
          description: "ID of the reservation to cancel"

    CancelReservationByInfoRequest:
      type: object
      required:
        - reservation_date
        - start_time
        - seat_type
        - seat_number
      properties:
        reservation_date:
          type: string
          format: date
          example: "2024-01-15"
        reservation_type:
          type: string
          enum: ["only running programs", "internship", "project", "dorsan desk"]
          example: "internship"
        start_time:
          type: string
          example: "09:00"
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    CancelReservationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    IsNextWeekOpenResponse:
      type: object
      properties:
        success:
          type: boolean
        next_week_open:
          type: boolean

    IsUserDotinResponse:
      type: object
      properties:
        is_dotin:
          type: boolean

    UserActiveReservation:
      type: object
      properties:
        reservation_id:
          type: integer
          description: "Unique identifier of the reservation"
        date:
          type: string
          format: date
        day_of_week:
          type: integer
          description: "0=Monday, 1=Tuesday, 2=Wednesday, 3=Thursday, 4=Friday, 5=Saturday, 6=Sunday"
        reservation_type:
          type: string
        start_time:
          type: string
        end_time:
          type: string

    UserActiveReservationsResponse:
      type: object
      properties:
        success:
          type: boolean
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/UserActiveReservation'

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie automatically set after login

paths:
  # ==================== AUTH ENDPOINTS ====================
  
  /auth/register:
    post:
      summary: Registers a new user and logs in if the registeration is successful
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Missing required fields or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username, email, or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /auth/login:
    post:
      summary: Login to your account
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout of your account
      operationId: logoutUser
      tags:
        - Authentication
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== USER ENDPOINTS ====================

  /user/is_logged_in:
    get:
      summary: Check if user is logged in
      operationId: isLoggedIn
      tags:
        - User
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  authenticated:
                    type: boolean

  /user/id:
    get:
      summary: Get current user ID
      operationId: getUserId
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User ID retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/session_info:
    get:
      summary: Get full session information
      operationId: getSessionInfo
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Session data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfoResponse'
        '401':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile:
    get:
      summary: Get current user profile
      operationId: getUserProfile
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile/{id}:
    get:
      summary: Get user profile by ID
      operationId: getUserProfileById
      tags:
        - User
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not logged in
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/updateEmail:
    put:
      summary: Update user email
      operationId: updateEmail
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailRequest'
      responses:
        '200':
          description: Email updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newEmail:
                    type: string
        '400':
          description: Invalid email format
        '401':
          description: Not logged in
        '409':
          description: Email already exists

  /user/updateUsername:
    put:
      summary: Update username
      operationId: updateUsername
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsernameRequest'
      responses:
        '200':
          description: Username updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newUsername:
                    type: string
        '400':
          description: Invalid username format
        '401':
          description: Not logged in
        '409':
          description: Username already exists

  /user/updatePhone:
    put:
      summary: Update phone number
      operationId: updatePhone
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePhoneRequest'
      responses:
        '200':
          description: Phone number updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newPhone:
                    type: string
        '400':
          description: Invalid phone number format
        '401':
          description: Not logged in
        '409':
          description: Phone number already exists

  # ==================== RESERVATION ENDPOINTS ====================

  /reservation/get_user_active_reservations:
    get:
      summary: Get user's active reservations
      operationId: getUserActiveReservations
      tags:
        - Reservations
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Active reservations retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActiveReservationsResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/weekly_schedule_intervals:
    post:
      summary: Get weekly schedule in interval format
      description: Returns weekly schedule (Sat-Wed) for a specific seat showing events and reservations as time intervals
      operationId: getWeeklyScheduleIntervals
      tags:
        - Reservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyScheduleByDateRequest'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  dates:
                    type: array
                    items:
                      type: object
                      properties:
                        events:
                          type: array
                          items:
                            type: object
                            properties:
                              start_time:
                                type: string
                              end_time:
                                type: string
                        reservations:
                          type: array
                          items:
                            type: object
                            properties:
                              start_time:
                                type: string
                              end_time:
                                type: string
                              reserved_by:
                                type: string
                              reservation_type:
                                type: string
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/current_week_schedule_intervals:
    post:
      summary: Get current week schedule in interval format
      description: Returns current week schedule (Sat-Wed) for a specific seat showing events and reservations as time intervals
      operationId: getCurrentWeekScheduleIntervals
      tags:
        - Reservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyScheduleRequest'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  dates:
                    type: array
                    items:
                      type: object
                      properties:
                        events:
                          type: array
                          items:
                            type: object
                            properties:
                              start_time:
                                type: string
                              end_time:
                                type: string
                        reservations:
                          type: array
                          items:
                            type: object
                            properties:
                              start_time:
                                type: string
                              end_time:
                                type: string
                              reserved_by:
                                type: string
                              reservation_type:
                                type: string
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/current_week_schedule_timeslots:
    post:
      summary: Get current week schedule with time slots
      description: Returns detailed current week schedule with 15-minute time slots for a specific seat
      operationId: getCurrentWeekScheduleTimeslots
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyScheduleRequest'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
