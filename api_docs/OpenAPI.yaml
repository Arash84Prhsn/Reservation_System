openapi: 3.0.0
info:
  title: Financial Technologies Lab Reservation System API
  description: |
    API for the Computer Lab Reservation System.
    
    ## Features
    - User registration with validation
    - Login/logout with session management
    - Profile management (view, update email, username, phone)
    - Session information retrieval
    - Weekly schedule viewing for specific seats (intervals and timeslots)
    - Reservation creation with conflict checking
    - User reservation limits and availability checking
    
    ## Authentication
    This API uses session-based authentication. After successful login, a session cookie is automatically set.
    All subsequent requests requiring authentication must include this cookie.
    
    ## Business Rules
    - Operating hours: 8:00 AM to 2:00 PM (6 hours)
    - Minimum reservation: 15 minutes
    - Time increments: 15 minutes (:00, :15, :30, :45)
    - Operating days: Saturday to Wednesday (no Thu/Fri)
    - Daily limit: 2 reservations per user per day
    - Reservation types: "only running programs", "internship", "project"
    
  version: 3.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:5000/api
    description: Development Server

components:
  schemas:
    # ============ AUTH SCHEMAS ============
    
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_\\u0600-\\u06FF\\s]{3,20}$"
          example: john_doe
          description: "Persian/English letters, numbers, underscore, spaces allowed"
        password:
          type: string
          minLength: 8
          example: SecurePass123
          description: "At least 8 chars, 1 uppercase, 1 lowercase, 1 number"
        email:
          type: string
          format: email
          example: user@example.com
          description: "Required if phone not provided"
        phone:
          type: string
          example: "09123456789"
          description: "Required if email not provided. Iranian or international format"
        association:
          type: string
          enum:
            - None
            - Dotin
            - Related Company
            - Bachelor student
            - Master's student
            - PhD student
          example: Master's student
          description: "User's association type"

    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Registration successful! You can now log in to your new account."
        data:
          type: object
          properties:
            username:
              type: string
            association:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          example: SecurePass123

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Logged in successfully"
        data:
          type: object
          properties:
            username:
              type: string
            association:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Logged out successfully"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    # ============ USER SCHEMAS ============

    UserProfile:
      type: object
      properties:
        username:
          type: string
        id:
          type: integer
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        association:
          type: string
          nullable: true

    UpdateEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: newemail@example.com

    UpdateUsernameRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: "^[a-zA-Z0-9_\\u0600-\\u06FF\\s]{3,20}$"
          example: new_username

    UpdatePhoneRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09351234567"
          description: "Iranian or international format"

    IdResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer

    SessionInfoResponse:
      type: object
      properties:
        logged_in:
          type: boolean
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        association:
          type: string
          nullable: true

    # ============ RESERVATION SCHEMAS ============

    WeeklyScheduleRequest:
      type: object
      required:
        - seat_type
        - seat_number
      properties:
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    WeeklyScheduleByDateRequest:
      type: object
      required:
        - date
        - seat_type
        - seat_number
      properties:
        date:
          type: string
          format: date
          example: "2024-01-15"
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    TimeSlot:
      type: object
      properties:
        timeslot_number:
          type: integer
          example: 1
        start_time:
          type: string
          example: "08:00"
        end_time:
          type: string
          example: "08:15"
        status:
          type: string
          enum: [free, reserved, event]
        reservation_type:
          type: string
          nullable: true
        reserved_by:
          type: string
          nullable: true

    DailySchedule:
      type: object
      properties:
        date:
          type: string
          format: date
        slots:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'

    WeeklyScheduleResponse:
      type: object
      properties:
        success:
          type: boolean
        schedule:
          type: array
          items:
            $ref: '#/components/schemas/DailySchedule'

    OpenDatesRequest:
      type: object
      required:
        - seat_type
      properties:
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin

    OpenDatesResponse:
      type: object
      properties:
        success:
          type: boolean
        dates:
          type: array
          items:
            type: string
            format: date

    HitLimitRequest:
      type: object
      required:
        - reservation_date
      properties:
        reservation_date:
          type: string
          format: date
          example: "2024-01-15"

    HitLimitResponse:
      type: object
      properties:
        success:
          type: boolean
        has_hit_limit:
          type: boolean

    MakeReservationRequest:
      type: object
      required:
        - reservation_date
        - reservation_type
        - start_time
        - end_time
        - seat_type
        - seat_number
      properties:
        reservation_date:
          type: string
          format: date
          example: "2024-01-15"
        reservation_type:
          type: string
          enum: ["only running programs", "internship", "project"]
          example: "internship"
        start_time:
          type: string
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          example: "09:00"
        end_time:
          type: string
          pattern: "^([0-1][0-9]|2[0-3]):[0-5][0-9]$"
          example: "10:00"
        seat_type:
          type: string
          enum: [dotin, optimization, laptop, manager]
          example: dotin
        seat_number:
          type: integer
          minimum: 1
          maximum: 4
          example: 1

    ReservationConflictWarning:
      type: object
      properties:
        needed:
          type: boolean
        conflict_intervals:
          type: array
          items:
            type: object
            properties:
              start_time:
                type: string
              end_time:
                type: string
        warning_message:
          type: string

    MakeReservationResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        warning:
          $ref: '#/components/schemas/ReservationConflictWarning'
        reservation_date:
          type: object
          properties:
            start_time:
              type: string
            end_time:
              type: string
            reservation_type:
              type: string
            reservation_date:
              type: string
            seat_type:
              type: string
            seat_number:
              type: integer

    IsNextWeekOpenResponse:
      type: object
      properties:
        success:
          type: boolean
        next_week_open:
          type: boolean

    IsUserDotinResponse:
      type: object
      properties:
        is_dotin:
          type: boolean

    UserActiveReservation:
      type: object
      properties:
        date:
          type: string
          format: date
        day_of_week:
          type: string
        reservation_type:
          type: string
        start_time:
          type: string
        end_time:
          type: string

    UserActiveReservationsResponse:
      type: object
      properties:
        success:
          type: boolean
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/UserActiveReservation'

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie automatically set after login

paths:
  # ==================== AUTH ENDPOINTS ====================
  
  /auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Missing required fields or invalid format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username, email, or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /auth/login:
    post:
      summary: Login to your account
      operationId: loginUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Logout of your account
      operationId: logoutUser
      tags:
        - Authentication
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== USER ENDPOINTS ====================

  /user/is_logged_in:
    get:
      summary: Check if user is logged in
      operationId: isLoggedIn
      tags:
        - User
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  authenticated:
                    type: boolean

  /user/id:
    get:
      summary: Get current user ID
      operationId: getUserId
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User ID retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/session_info:
    get:
      summary: Get full session information
      operationId: getSessionInfo
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Session data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfoResponse'
        '401':
          description: No active session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile:
    get:
      summary: Get current user profile
      operationId: getUserProfile
      tags:
        - User
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile/{id}:
    get:
      summary: Get user profile by ID
      operationId: getUserProfileById
      tags:
        - User
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not logged in
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/updateEmail:
    put:
      summary: Update user email
      operationId: updateEmail
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailRequest'
      responses:
        '200':
          description: Email updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newEmail:
                    type: string
        '400':
          description: Invalid email format
        '401':
          description: Not logged in
        '409':
          description: Email already exists

  /user/updateUsername:
    put:
      summary: Update username
      operationId: updateUsername
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsernameRequest'
      responses:
        '200':
          description: Username updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newUsername:
                    type: string
        '400':
          description: Invalid username format
        '401':
          description: Not logged in
        '409':
          description: Username already exists

  /user/updatePhone:
    put:
      summary: Update phone number
      operationId: updatePhone
      tags:
        - User
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePhoneRequest'
      responses:
        '200':
          description: Phone number updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  newPhone:
                    type: string
        '400':
          description: Invalid phone number format
        '401':
          description: Not logged in
        '409':
          description: Phone number already exists

  # ==================== RESERVATION ENDPOINTS ====================

  /reservation/get_user_active_reservations:
    get:
      summary: Get user's active reservations
      operationId: getUserActiveReservations
      tags:
        - Reservations
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Active reservations retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserActiveReservationsResponse'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/weekly_schedule_intervals:
    post:
      summary: Get weekly schedule in interval format
      description: Returns weekly schedule (Sat-Wed) for a specific seat showing events and reservations as time intervals
      operationId: getWeeklyScheduleIntervals
      tags:
        - Reservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyScheduleByDateRequest'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  dates:
                    type: array
                    items:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          events:
                            type: array
                            items:
                              type: object
                              properties:
                                start_time:
                                  type: string
                                  example: "10:00"
                                end_time:
                                  type: string
                                  example: "12:00"
                          reservations:
                            type: array
                            items:
                              type: object
                              properties:
                                start_time:
                                  type: string
                                  example: "09:00"
                                end_time:
                                  type: string
                                  example: "10:00"
                                reserved_by:
                                  type: string
                                  example: "john_doe"
                                reservation_type:
                                  type: string
                                  enum: ["only running programs", "internship", "project"]
                                  example: "internship"
              example:
                success: true
                dates:
                  - "2024-01-13":
                      events: []
                      reservations:
                        - start_time: "09:00"
                          end_time: "10:00"
                          reserved_by: "john_doe"
                          reservation_type: "internship"
                  - "2024-01-14":
                      events:
                        - start_time: "10:00"
                          end_time: "12:00"
                      reservations: []
                  - "2024-01-15":
                      events: []
                      reservations: []
                  - "2024-01-16":
                      events: []
                      reservations: []
                  - "2024-01-17":
                      events: []
                      reservations: []
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/current_week_schedule_intervals:
    post:
      summary: Get current week schedule in interval format
      description: Returns current week schedule (Sat-Wed) for a specific seat showing events and reservations as time intervals
      operationId: getCurrentWeekScheduleIntervals
      tags:
        - Reservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyScheduleRequest'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  dates:
                    type: array
                    items:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          events:
                            type: array
                            items:
                              type: object
                              properties:
                                start_time:
                                  type: string
                                  example: "10:00"
                                end_time:
                                  type: string
                                  example: "12:00"
                          reservations:
                            type: array
                            items:
                              type: object
                              properties:
                                start_time:
                                  type: string
                                  example: "09:00"
                                end_time:
                                  type: string
                                  example: "10:00"
                                reserved_by:
                                  type: string
                                  example: "john_doe"
                                reservation_type:
                                  type: string
                                  enum: ["only running programs", "internship", "project"]
                                  example: "internship"
              example:
                success: true
                dates:
                  - "2024-01-13":
                      events: []
                      reservations:
                        - start_time: "09:00"
                          end_time: "10:00"
                          reserved_by: "john_doe"
                          reservation_type: "internship"
                  - "2024-01-14":
                      events:
                        - start_time: "10:00"
                          end_time: "12:00"
                      reservations: []
                  - "2024-01-15":
                      events: []
                      reservations: []
                  - "2024-01-16":
                      events: []
                      reservations: []
                  - "2024-01-17":
                      events: []
                      reservations: []
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservation/weekly_schedule_timeslots:
    post:
      summary: Get weekly schedule by date with time slots
      description: Returns detailed weekly schedule with 15-minute time slots for a specific seat based on the week containing the given date
      operationId: getWeeklyScheduleTimeslots
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyScheduleByDateRequest'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyScheduleResponse'
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not logged in

  /reservation/is_next_week_open:
    get:
      summary: Check if next week reservations are open
      description: Returns true if current time is past Tuesday 12:00 PM
      operationId: isNextWeekOpen
      tags:
        - Reservations
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IsNextWeekOpenResponse'

  /reservation/is_user_dotin:
    get:
      summary: Check if user has Dotin association
      operationId: isUserDotin
      tags:
        - Reservations
      security:
        - sessionAuth: []
      responses:
        '200':
          description: User's Dotin status
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_dotin:
                    type: boolean
        '401':
          description: Not logged in

  /reservation/open_dates_for_user:
    get:
      summary: Get possible reservation dates for user and seat type
      operationId: getOpenDatesForUser
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenDatesRequest'
      responses:
        '200':
          description: Available dates retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenDatesResponse'
        '400':
          description: Missing seat_type or invalid seat type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not logged in

  /reservation/has_user_hit_reservation_limit:
    get:
      summary: Check if user has hit daily reservation limit
      description: Returns true if user has 2 or more active reservations on the given date
      operationId: hasUserHitReservationLimit
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HitLimitRequest'
      responses:
        '200':
          description: Limit status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HitLimitResponse'
        '400':
          description: Missing reservation_date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not logged in

  /reservation/make_reservation:
    post:
      summary: Create a new reservation
      description: |
        Creates a reservation after validating:
        - Time within operating hours (8:00-14:00)
        - Minimum 15 minutes duration
        - 15-minute increments
        - Date is within allowed reservation window
        - User hasn't hit daily limit (2 per day)
        - No conflicts with events or other reservations
        - Valid seat number for the seat type
      operationId: makeReservation
      tags:
        - Reservations
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeReservationRequest'
            examples:
              internship:
                summary: Internship reservation
                value:
                  reservation_date: "2024-01-15"
                  reservation_type: "internship"
                  start_time: "09:00"
                  end_time: "10:00"
                  seat_type: "dotin"
                  seat_number: 1
              project:
                summary: Project reservation
                value:
                  reservation_date: "2024-01-15"
                  reservation_type: "project"
                  start_time: "10:30"
                  end_time: "12:00"
                  seat_type: "laptop"
                  seat_number: 2
              system_only:
                summary: System only (running programs)
                value:
                  reservation_date: "2024-01-15"
                  reservation_type: "only running programs"
                  start_time: "08:00"
                  end_time: "14:00"
                  seat_type: "optimization"
                  seat_number: 1
      responses:
        '200':
          description: Reservation validated successfully (may have warnings)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MakeReservationResponse'
              examples:
                success_no_warning:
                  summary: Success without warning
                  value:
                    success: true
                    message: "This reservation is valid and can be submitted"
                    warning:
                      needed: false
                    reservation_date:
                      start_time: "09:00"
                      end_time: "10:00"
                      reservation_type: "internship"
                      reservation_date: "2024-01-15"
                      seat_type: "dotin"
                      seat_number: 1
                success_with_warning:
                  summary: Success with warning (system only conflicts)
                  value:
                    success: true
                    message: "Your reservations has been validated with a warning"
                    warning:
                      needed: true
                      conflict_intervals:
                        - start_time: "09:00"
                          end_time: "10:00"
                        - start_time: "11:00"
                          end_time: "12:00"
                      warning_message: "The computer will be unavailable during these times"
                    reservation_date:
                      start_time: "09:00"
                      end_time: "12:00"
                      reservation_type: "internship"
                      reservation_date: "2024-01-15"
                      seat_type: "dotin"
                      seat_number: 1
        '400':
          description: Validation failed (conflict, invalid time, etc.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  warning:
                    type: object
                    properties:
                      needed:
                        type: boolean
              examples:
                event_conflict:
                  value:
                    success: false
                    message: "There is an event booked for that time"
                    warning:
                      needed: false
                reservation_conflict:
                  value:
                    success: false
                    message: "The reservation is in conflict with other reservations"
                    warning:
                      needed: false
                invalid_time:
                  value:
                    success: false
                    message: "Start time must be before end time"
                    warning:
                      needed: false
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'